<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect workaround
      // Redirects all 404s back to index.html with the path as a query param
      const path = window.location.pathname
      window.location.replace('/?redirect=' + encodeURIComponent(path))
    </script>
  </head>
  <body></body>
</html>
